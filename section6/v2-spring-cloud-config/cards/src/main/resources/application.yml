

server:
  port: 9000

  config:
    import: "optional:configserver:http://localhost:8071/"

  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"


spring:
  application:
    name: cards
  profiles:
    active: "prod"

  datasource:

    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
    generate-unique-name: false

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      show-sql: true
      ddl-auto: update


management:
  endpoints:
    web:
      exposure:
        include: "*"





